<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop-up Design</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="banner">
        <div class="brand">
            <img draggable="false" src="assets/logo.svg" alt="Logo">
        </div>
        <div class="menu" id="menu">
            <div class="ellipsis-icon" id="menu-trigger">
                <img draggable="false" src="assets/ellipsis.svg" alt="Menu">
            </div>
            <div class="window" id="menu-window">
                <div class="window-item">
                    <div class="window-item-icon">
                        <img draggable="false" src="assets/profile.svg" alt="profile icon">
                    </div>
                    <div class="window-item-text">
                        <div class="title">Profile</div>
                    </div>
                </div>
                <div class="window-item">
                    <div class="window-item-icon">
                        <img draggable="false" src="assets/log-out.svg" alt="logout icon">
                    </div>
                    <div class="window-item-text">
                        <div class="title">Log out</div>
                    </div>
                </div>
                <div class="window-item">
                    <div class="window-item-icon">
                        <img draggable="false" src="assets/placeholder.svg" alt="placeholder icon">
                    </div>
                    <div class="window-item-text">
                        <div class="title">Button</div>
                    </div>
                </div>
                <div class="separator"></div>
                <div class="window-item">
                    <div class="window-item-icon">
                        <img draggable="false" src="assets/help.svg" alt="help icon"> 
                    </div>
                    <div class="window-item-text">
                        <div class="title">Help</div>
                    </div>
                </div>
                <div class="window-item">
                    <div class="window-item-icon">
                        <img draggable="false" src="assets/feedback.svg" alt="feedback icon">
                    </div>
                    <div class="window-item-text">
                        <div class="title">Feedback</div>
                    </div>
                </div>
                <div class="window-item">
                    <div class="window-item-icon">
                        <img draggable="false" src="assets/version-history.svg" alt="feedback icon">
                    </div>
                    <div class="window-item-text">
                        <div class="title">Version history</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="logic.js"></script>
</body>
</html>
